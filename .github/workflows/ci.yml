name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build · test · package
    runs-on: macos-14
    # macos-14 = Apple Silicon (arm64) runners; we explicitly do NOT support Intel.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest available Xcode 16 (Swift 6 toolchain)
        # macos-14 default toolchain is Swift 5.10; Package.swift declares
        # swift-tools-version: 6.0, so we must point xcode-select at an Xcode 16.
        run: |
          XCODE=$(ls -d /Applications/Xcode_16* 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::Xcode 16 not present on runner. Available:"
            ls /Applications | grep -i xcode
            exit 1
          fi
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Identify toolchain
        run: |
          sw_vers
          uname -m
          swift --version
          xcodebuild -version

      - name: Build (release, arm64)
        run: swift build -c release --arch arm64

      - name: Run unit tests
        run: swift test -c release --arch arm64

      - name: Smoke-test engine
        run: |
          ENGINE=$(swift build -c release --arch arm64 --show-bin-path)/diskwipe-engine
          test -x "$ENGINE" || (echo "engine binary missing"; exit 1)
          "$ENGINE" list | head -c 4096
          echo
          echo "─ snapshot of non-existent disk (must skip gracefully) ─"
          "$ENGINE" snapshot --disk disk999

      - name: Verify the .app bundle script runs
        run: |
          # bundle.sh's first lines hard-fail on non-arm64 — verify guard works.
          head -20 bundle.sh
          # Do NOT execute bundle.sh: it copies to /Applications via osascript
          # which CI cannot interactively authorise. The DMG-build step below
          # instead uses a hand-staged .app derived from the SPM build outputs,
          # so the make-dmg.sh pipeline is still smoke-tested.

      - name: Smoke-test DMG builder
        run: |
          set -euo pipefail
          # Stage a minimal .app from the SPM build outputs (no /Applications
          # write needed). This exercises the same code path as a real release
          # build for everything except the final install step.
          STAGE_APP="DiskWipe.app"
          rm -rf "$STAGE_APP"
          mkdir -p "$STAGE_APP/Contents/MacOS"
          BIN_DIR="$(swift build -c release --arch arm64 --show-bin-path)"
          cp "$BIN_DIR/DiskWipeApp"      "$STAGE_APP/Contents/MacOS/DiskWipe"
          cp "$BIN_DIR/diskwipe-engine"  "$STAGE_APP/Contents/MacOS/"
          cat > "$STAGE_APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>OS Disk Manager</string>
            <key>CFBundleIdentifier</key><string>org.officesentinel.diskwipe</string>
            <key>CFBundleExecutable</key><string>DiskWipe</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0-ci</string>
            <key>CFBundleVersion</key><string>1</string>
          </dict>
          </plist>
          PLIST
          codesign --force --sign - "$STAGE_APP"

          # Now run the real make-dmg.sh against the staged .app.
          ./Scripts/dmg/make-dmg.sh
          ls -lh dist/DiskWipe-*-arm64.dmg
          # Verify the DMG mounts cleanly.
          hdiutil verify dist/DiskWipe-*-arm64.dmg
